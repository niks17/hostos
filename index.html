<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#01696f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HostOS" />
    <title>HostOS</title>

    <!-- Fonts: non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"></noscript>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #f8fafc;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Splash screen shown while JS loads ── */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #01696f 0%, #024f53 60%, #013a3d 100%);
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash.hide {
        opacity: 0;
        visibility: hidden;
      }

      .splash-logo {
        width: 72px;
        height: 72px;
        background: rgba(255,255,255,0.15);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin-bottom: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      }

      .splash-title {
        font-size: 28px;
        font-weight: 900;
        color: white;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }

      .splash-sub {
        font-size: 13px;
        color: rgba(255,255,255,0.6);
        margin-bottom: 40px;
      }

      .splash-spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid rgba(255,255,255,0.25);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Dark mode splash */
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; }
      }
    </style>
  </head>
  <body>
    <!-- Splash: visible immediately, hidden once React mounts -->
    <div id="splash">
      <div class="splash-logo">🏠</div>
      <p class="splash-title">HostOS</p>
      <p class="splash-sub">Upravljanje apartmanima</p>
      <div class="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash once React has mounted (first paint)
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function(mutations) {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var splash = document.getElementById('splash');
            if (splash) {
              splash.classList.add('hide');
              setTimeout(function() { splash.remove(); }, 450);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
