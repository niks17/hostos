name: Keep Supabase Alive

# Besplatni Supabase projekat se pauzira posle 7 dana bez ijednog zahteva
# (i tada izgubi DNS — login prestane da radi). Ovaj workflow šalje jedan
# lagani zahtev dva puta nedeljno da drži bazu budnom.
#
# Bonus: ako Supabase padne (npr. 521), curl --fail obori akciju → GitHub
# ti pošalje email. Tako odmah znaš ako nešto nije u redu.

on:
  schedule:
    - cron: '0 6 * * 1,4'   # Ponedeljak i Četvrtak u 06:00 UTC — max razmak ~3 dana (< 7)
  workflow_dispatch:         # dugme za ručno pokretanje u GitHub → Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: https://hsbgxunrslsbeyjwmeou.supabase.co
          # Anon ključ je namerno javan (zaštita ide preko RLS) — bezbedno ovde.
          SUPABASE_ANON_KEY: sb_publishable_spBwQ9O2iOjRnfRbxVh95g_op31CPt4
        run: |
          echo "Pingam Supabase da ostane budan..."
          curl -sS --fail -o /dev/null -w "HTTP %{http_code} | %{time_total}s\n" \
            "${SUPABASE_URL}/rest/v1/apartmani?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}"
          echo "✅ Supabase je budan."
